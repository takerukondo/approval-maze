name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Test
        run: pytest -q
      - name: Demo scenario
        run: approval-maze demo --quiet
      - name: Build wheel and source distribution
        run: python -m build
      - name: Smoke-test the wheel
        run: |
          python -m venv /tmp/approval-maze-wheel
          /tmp/approval-maze-wheel/bin/pip install dist/*.whl
          /tmp/approval-maze-wheel/bin/approval-maze demo --quiet
